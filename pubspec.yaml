name: mpesa_ethiopia
description: M-PESA Ethiopia - Complete Mobile Money Application
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State Management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^14.2.3
  
  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  
  # API & Networking
  dio: ^5.5.0+1
  retrofit: ^4.1.0
  connectivity_plus: ^6.0.5
  
  # Utilities
  intl: ^0.19.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
assets:
    - assets/images/logo.png